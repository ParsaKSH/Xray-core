name: Build and Release

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: linux-arm64
    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Get project dependencies
        run: go mod download

      - name: Build Xray
        run: |
          mkdir -p build_assets
          COMMID=$(git describe --always --dirty)
          go build -o build_assets/xray -trimpath -buildvcs=false \
            -gcflags="all=-l=4" \
            -ldflags="-X github.com/xtls/xray-core/core.build=${COMMID} -s -w -buildid=" \
            -v ./main

      - name: Download geodat assets
        run: |
          wget -qO build_assets/geoip.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          wget -qO build_assets/geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

      - name: Copy README.md & LICENSE
        run: |
          cp README.md build_assets/
          cp LICENSE build_assets/

      - name: Create ZIP archive
        if: github.event_name == 'release'
        run: |
          pushd build_assets
          touch -mt $(date +%Y01010000) *
          zip -9vr ../Xray-${{ matrix.asset_name }}.zip .
          popd
          FILE=./Xray-${{ matrix.asset_name }}.zip
          DGST=$FILE.dgst
          for METHOD in md5 sha1 sha256 sha512; do
            openssl dgst -$METHOD $FILE | sed 's/([^)]*)//g' >>$DGST
          done

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./Xray-${{ matrix.asset_name }}.zip*
          tag: ${{ github.ref }}
          file_glob: true

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Xray-${{ matrix.asset_name }}
          path: ./build_assets/*
